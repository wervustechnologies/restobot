<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; }
    body { background: transparent; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="module">
    import * as THREE from '/three.module.js';
    import { GLTFLoader } from '/GLTFLoader.js';

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0x000000, 0);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 5);

    scene.add(new THREE.AmbientLight(0xffffff, 2));

    // CUSTOM LOADER TO REMOVE WHITE BACKGROUND VIA CANVAS
    const img = new Image();
    img.src = '/kid.png';
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      const w = canvas.width;
      const h = canvas.height;

      // Flood-fill from corners to remove only connected background
      const visited = new Uint8Array(w * h);
      const threshold = 50;

      // Sample background color from top-left corner
      const bgIdx = 0;
      const bgR = data[bgIdx];
      const bgG = data[bgIdx + 1];
      const bgB = data[bgIdx + 2];

      function matchBg(x, y) {
        const i = (y * w + x) * 4;
        const dr = data[i] - bgR;
        const dg = data[i + 1] - bgG;
        const db = data[i + 2] - bgB;
        return Math.sqrt(dr * dr + dg * dg + db * db) < threshold;
      }

      function floodFill(startX, startY) {
        const stack = [[startX, startY]];
        while (stack.length > 0) {
          const [x, y] = stack.pop();
          if (x < 0 || x >= w || y < 0 || y >= h) continue;
          const key = y * w + x;
          if (visited[key]) continue;
          if (!matchBg(x, y)) continue;
          visited[key] = 1;
          stack.push([x - 1, y], [x + 1, y], [x, y - 1], [x, y + 1]);
        }
      }

      // Flood-fill from all 4 corners
      floodFill(0, 0);
      floodFill(w - 1, 0);
      floodFill(0, h - 1);
      floodFill(w - 1, h - 1);

      // Set alpha to 0 for visited (background) pixels, with soft edge
      for (let i = 0; i < data.length; i += 4) {
        const px = (i / 4) % w;
        const py = Math.floor(i / 4 / w);
        const key = py * w + px;
        if (visited[key]) {
          // Check if this pixel borders a non-visited pixel (edge)
          const isEdge = [[-1,0],[1,0],[0,-1],[0,1]].some(([dx, dy]) => {
            const nx = px + dx, ny = py + dy;
            return nx >= 0 && nx < w && ny >= 0 && ny < h && !visited[ny * w + nx];
          });
          if (isEdge) {
            data[i + 3] = 60; // semi-transparent edge for softness
          } else {
            data[i + 3] = 0;
          }
        }
      }
      ctx.putImageData(imageData, 0, 0);
      
      const texture = new THREE.CanvasTexture(canvas);
      texture.minFilter = THREE.LinearFilter;
      
      const material = new THREE.MeshBasicMaterial({ 
        map: texture, 
        transparent: true,
        opacity: 0
      });

      const geometry = new THREE.PlaneGeometry(3, 3.8);
      const mesh = new THREE.Mesh(geometry, material);
      mesh.scale.setScalar(0.01);
      mesh.visible = false;
      scene.add(mesh);

      const startTime = Date.now();
      function internalAnimate() {
        const elapsed = (Date.now() - startTime) / 1000;
        
        if (elapsed < 0.8) {
          const p = elapsed / 0.8;
          // Character simply fades and scales in
          mesh.visible = true;
          mesh.scale.setScalar(0.01 + p * 0.99);
          material.opacity = p;
        } else {
          // Steady state
          mesh.scale.setScalar(1.0);
          material.opacity = 1.0;
          mesh.visible = true;
        }
        
        requestAnimationFrame(internalAnimate);
      }
      internalAnimate();
    };

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
